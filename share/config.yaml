# bind accepts a single interface name, a list, or "all"
# bind: lo                    # loopback only (default)
# bind: [enp2s0, wlan0]       # multiple interfaces
# bind: all                   # all active interfaces (0.0.0.0)
bind: lo
logLevel: info

api:
  enabled: true
  port: 8018
  # cors:
  #   origins: ["https://odio-pwa.vercel.app"] # default for PWA
  #   origins: ["https://app.example.com"]  # specific origins
  ui:
    enabled: false


zeroconf:
  enabled: false

systemd:
  enabled: false
  timeout: 90s
  system:
    - bluetooth.service
    - upmpdcli.service
  user:
    - mpd.service
    - pipewire-pulse.service
    - pulseaudio.service
    - shairport-sync.service
    - snapclient.service
    - spotifyd.service
    # Each entry may also be an object to attach a URL exposed in the API:
    # - name: mympd.service
    #   url: ":8080"

power:
  enabled: false
  capabilities:
    poweroff: false
    reboot: false

# Agnostic upgrade backend: reads a result file written by an external detector
# and triggers external systemd user units. Disabled by default.
upgrade:
  enabled: false
  # resultFile: /var/cache/odio/upgrades.json  # JSON read and watched for changes
  # checkUnit: odio-check-upgrade.service       # user unit re-run by POST /upgrade/check
  # upgradeUnit: odio-upgrade.service           # user unit run by POST /upgrade/start
  # progressSocket: ""                          # unix socket the upgrade script streams JSON progress to; default $XDG_RUNTIME_DIR/odio-api/upgrade.sock

pulseaudio:
  enabled: true

mpris:
  enabled: true
  timeout: 5s

bluetooth:
  enabled: true
  powerOnStart: false   # power on adapter at service startup
  timeout: 5s
  pairingTimeout: 60s
  idleTimeout: 30m
  scanTimeout: 60s
